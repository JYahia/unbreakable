<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Training Program</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;
  --surface:#181818;
  --surface2:#222;
  --border:#2c2c2c;
  --text:#f0ede8;
  --muted:#686460;
  --accent:#e8a030;
  --green:#3fbf7f;
  --blue:#4899e8;
}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif;
  min-height:100dvh;
  max-width:480px;
  margin:0 auto;
  -webkit-tap-highlight-color:transparent;
}

/* ── HEADER ─────────────────── */
header{
  position:sticky;top:0;z-index:20;
  background:var(--bg);
  padding:env(safe-area-inset-top,0) 0 0;
}
.header-inner{
  padding:18px 20px 0;
}
.program-label{
  font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;font-weight:600;
}

/* ── TABS ──────────────────── */
.tabs{
  display:flex;gap:0;overflow-x:auto;scrollbar-width:none;
  border-bottom:1px solid var(--border);
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:11px 16px;
  font-size:12px;font-weight:700;letter-spacing:.06em;
  color:var(--muted);background:none;border:none;cursor:pointer;
  border-bottom:2px solid transparent;position:relative;bottom:-1px;
  transition:color .15s,border-color .15s;white-space:nowrap;
}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}

/* ── DAY CONTENT ────────────── */
.day{display:none;padding:20px 20px calc(env(safe-area-inset-bottom,0)+40px)}
.day.active{display:block}
.day-header{margin-bottom:22px}
.day-title{font-size:24px;font-weight:800;letter-spacing:-.03em;line-height:1.2}
.day-sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:5px}
.day-note{
  font-size:12px;color:var(--muted);
  border-left:2px solid var(--accent);padding-left:10px;
  margin-top:12px;line-height:1.5;font-style:italic;
}

/* ── EXERCISE CARD ──────────── */
.exercise{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;padding:15px 16px;
}
.exercise.optional{
  border-style:dashed;opacity:.8;
}
.ex-top{
  display:flex;align-items:flex-start;gap:10px;
  margin-bottom:13px;
}
.ex-num{
  font-size:10px;font-weight:700;letter-spacing:.1em;
  color:var(--muted);flex-shrink:0;margin-top:3px;
  font-variant-numeric:tabular-nums;
}
.ex-name{
  font-size:15px;font-weight:700;letter-spacing:-.01em;
  line-height:1.35;flex:1;
}
.badge-group{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0}
.badge{
  font-size:9px;font-weight:800;letter-spacing:.09em;
  padding:3px 7px;border-radius:5px;text-transform:uppercase;white-space:nowrap;
}
.b-warmup{background:rgba(232,160,48,.15);color:var(--accent);border:1px solid rgba(232,160,48,.3)}
.b-tag{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border)}
.b-opt{background:rgba(72,153,232,.1);color:var(--blue);border:1px solid rgba(72,153,232,.25)}

.ex-bottom{
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;
}
.sets-reps{font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1}
.sets-reps em{font-size:11px;font-weight:500;color:var(--muted);font-style:normal;margin-left:3px;letter-spacing:0}
.rest-block{text-align:right}
.rest-label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:3px;font-weight:600}
.rest-val{font-size:14px;font-weight:700;color:var(--green);letter-spacing:-.01em}

.ex-note{
  margin-top:11px;padding-top:11px;
  border-top:1px solid var(--border);
  font-size:12px;color:var(--muted);line-height:1.5;
}

/* ── REST DIVIDER ───────────── */
.rest-div{
  display:flex;align-items:center;gap:10px;
  padding:2px 0;margin:4px 0;
}
.rest-div-line{flex:1;height:1px;background:var(--border)}
.rest-div-pill{
  font-size:10px;font-weight:700;letter-spacing:.07em;
  color:var(--muted);
  background:var(--surface2);
  border:1px solid var(--border);
  padding:5px 12px;border-radius:20px;
  white-space:nowrap;flex-shrink:0;
}
.rest-div-pill .ri{font-size:9px;margin-right:4px;opacity:.7}

/* ── REST DAY ───────────────── */
.rest-day{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:70px 20px;text-align:center;gap:14px;
}
.rest-icon{font-size:52px;line-height:1}
.rest-title{font-size:28px;font-weight:800;letter-spacing:-.03em}
.rest-words{font-size:14px;color:var(--muted);line-height:1.7}

/* ── RULES CARD ─────────────── */
.rules-card{
  margin-top:8px;background:var(--surface);
  border:1px solid var(--border);border-radius:14px;padding:14px 16px;
}
.rules-heading{
  font-size:9px;text-transform:uppercase;letter-spacing:.16em;
  color:var(--muted);font-weight:700;margin-bottom:10px;
}
.rule-row{
  display:flex;justify-content:space-between;align-items:center;
  font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);gap:12px;
}
.rule-row:last-child{border-bottom:none}
.rl{color:var(--muted)}
.rv{font-weight:700;color:var(--text);text-align:right}

/* ── PROGRESS INDICATOR ─────── */
.prog{
  display:flex;gap:3px;align-items:center;
  padding:12px 20px 0;justify-content:center;
}
.prog-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--border);cursor:pointer;transition:all .2s;
}
.prog-dot.active{background:var(--accent);width:16px;border-radius:3px}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <p class="program-label">Training Program</p>
    <div class="tabs" role="tablist" id="tabs"></div>
  </div>
</header>

<div id="days-container"></div>

<script>
const DAYS = [
  {
    tag:"Day 1", title:"Chest & Triceps",
    exercises:[
      { n:"Pec Deck / Cable Fly",  s:"2", r:"12–15", rs:"60–90 sec", ra:"60–90 sec", w:false, label:"Activation", note:"Light weight — chest activation, reduce shoulder dominance. Not fatigue." },
      { n:"Bench Press",           s:"4", r:"5–8",   rs:"2–3 min",   ra:"2–3 min",   w:true,  label:"Heavy",      note:"Main mass builder." },
      { n:"Incline Dumbbell Press",s:"3", r:"8–10",  rs:"2–3 min",   ra:"2–3 min",   w:true,  label:"Heavy",      note:"Upper chest priority." },
      { n:"Cable Fly",             s:"3", r:"10–12", rs:"60–90 sec", ra:"60–90 sec", w:false,                     note:"Controlled stretch and squeeze." },
      { n:"Triceps Pushdown",      s:"3", r:"10–12", rs:"60–90 sec", ra:"60–90 sec", w:false  },
      { n:"Overhead Triceps Extension", s:"2", r:"12–15", rs:"60–90 sec", ra:null,  w:false,  label:"Finisher"   },
    ]
  },
  {
    tag:"Day 2", title:"Back & Biceps",
    exercises:[
      { n:"Pull-Ups / Lat Pulldown", s:"4", r:"6–10", rs:"2–3 min",   ra:"2–3 min",   w:false, label:"Heavy",   note:"Lat width." },
      { n:"Barbell Row",             s:"4", r:"6–8",  rs:"2–3 min",   ra:"2–3 min",   w:true,  label:"Heavy",   note:"Back thickness." },
      { n:"Chest Supported Row",     s:"3", r:"8–10", rs:"2–3 min",   ra:"2–3 min",   w:false,                  note:"Cleaner rowing without lower-back fatigue." },
      { n:"Dumbbell Curl",           s:"3", r:"8–12", rs:"60–90 sec", ra:"60–90 sec", w:false  },
      { n:"Hammer Curl",             s:"3", r:"10–12",rs:"60–90 sec", ra:null,         w:false, label:"Finisher",note:"Also helps forearms." },
    ]
  },
  {
    tag:"Rest", title:"Rest Day", isRest:true
  },
  {
    tag:"Day 4", title:"Shoulders & Upper Chest",
    dayNote:"Aesthetic frame-building day.",
    exercises:[
      { n:"Incline Smith Machine Press",       s:"4", r:"8–10",  rs:"2–3 min",   ra:"2–3 min",   w:true,  label:"Heavy",   note:"Upper chest focus without excessive stabilization fatigue." },
      { n:"Seated Dumbbell Shoulder Press",    s:"3", r:"8–10",  rs:"2–3 min",   ra:"2–3 min",   w:true,  label:"Heavy"  },
      { n:"Lateral Raises",                    s:"5", r:"12–15", rs:"60–90 sec", ra:"60–90 sec", w:false,                  note:"Very important for width." },
      { n:"Rear Delt Fly",                     s:"4", r:"12–15", rs:"60–90 sec", ra:"60–90 sec", w:false,                  note:"Critical for balanced aesthetics & posture." },
      { n:"Cable Curl or Rope Pushdown",       s:"2", r:"12",    rs:"60–90 sec", ra:null,         w:false, optional:true,   note:"Only if recovery is good." },
    ]
  },
  {
    tag:"Day 5", title:"Legs",
    dayNote:"Minimal effective dose — enough to stay balanced and strong.",
    exercises:[
      { n:"Squat",           s:"4", r:"5–8",   rs:"2–3 min",   ra:"2–3 min",   w:true,  label:"Heavy"   },
      { n:"Romanian Deadlift",s:"3", r:"8–10",  rs:"2–3 min",   ra:"2–3 min",   w:true,  label:"Heavy"  },
      { n:"Leg Press",       s:"3", r:"10",    rs:"2–3 min",   ra:"2–3 min",   w:false, label:"Compound"},
      { n:"Leg Curl",        s:"2", r:"12",    rs:"60–90 sec", ra:"60–90 sec", w:false  },
      { n:"Calf Raises",     s:"3", r:"12–15", rs:"60–90 sec", ra:null,         w:false, label:"Finisher"},
    ]
  }
];

const RULES = [
  { l:"Heavy compounds (rest/set)", v:"2–3 min" },
  { l:"Isolation (rest/set)",       v:"60–90 sec" },
  { l:"Progression",                v:"All sets at top reps → add weight" },
];

let current = 0;

function buildTabs() {
  const cont = document.getElementById('tabs');
  DAYS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = d.tag;
    btn.setAttribute('role','tab');
    btn.onclick = () => switchDay(i);
    cont.appendChild(btn);
  });
}

function buildDays() {
  const cont = document.getElementById('days-container');
  DAYS.forEach((d, i) => {
    const div = document.createElement('div');
    div.className = 'day' + (i === 0 ? ' active' : '');
    div.id = 'day-' + i;

    if (d.isRest) {
      div.innerHTML = `
        <div class="rest-day">
          <div class="rest-icon">🛌</div>
          <div class="rest-title">Rest &amp; Recover</div>
          <div class="rest-words">Sleep. Eat. Recover.<br>The work is done.<br>Let your muscles grow.</div>
        </div>`;
      cont.appendChild(div);
      return;
    }

    let html = `
      <div class="day-header">
        <div class="day-title">${d.title}</div>
        <div class="day-sub">${d.tag} · ${d.exercises.length} exercises</div>
        ${d.dayNote ? `<div class="day-note">${d.dayNote}</div>` : ''}
      </div>`;

    d.exercises.forEach((ex, j) => {
      const isLast = j === d.exercises.length - 1;
      const num = String(j + 1).padStart(2, '0');

      const badges = [];
      if (ex.w) badges.push(`<span class="badge b-warmup">▲ Warm-up</span>`);
      if (ex.label) badges.push(`<span class="badge b-tag">${ex.label}</span>`);
      if (ex.optional) badges.push(`<span class="badge b-opt">Optional</span>`);

      html += `
        <div class="exercise${ex.optional ? ' optional' : ''}">
          <div class="ex-top">
            <span class="ex-num">${num}</span>
            <span class="ex-name">${ex.n}</span>
            <div class="badge-group">${badges.join('')}</div>
          </div>
          <div class="ex-bottom">
            <div class="sets-reps">${ex.s}<em>sets</em> × ${ex.r}<em>reps</em></div>
            <div class="rest-block">
              <span class="rest-label">Rest / set</span>
              <span class="rest-val">${ex.rs}</span>
            </div>
          </div>
          ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
        </div>`;

      if (!isLast && ex.ra) {
        html += `
          <div class="rest-div">
            <div class="rest-div-line"></div>
            <div class="rest-div-pill"><span class="ri">⏱</span>Rest ${ex.ra} before next</div>
            <div class="rest-div-line"></div>
          </div>`;
      }
    });

    html += `
      <div style="margin-top:8px"></div>
      <div class="rules-card">
        <div class="rules-heading">General Rules</div>
        ${RULES.map(r => `<div class="rule-row"><span class="rl">${r.l}</span><span class="rv">${r.v}</span></div>`).join('')}
      </div>`;

    div.innerHTML = html;
    cont.appendChild(div);
  });
}

function switchDay(i) {
  const tabs = document.querySelectorAll('.tab');
  const days = document.querySelectorAll('.day');
  tabs.forEach((t, j) => t.classList.toggle('active', j === i));
  days.forEach((d, j) => d.classList.toggle('active', j === i));
  current = i;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildTabs();
buildDays();
</script>
</body>
</html>
